{% extends 'base.html' %}

{% block content %}
<style>
    .wallet-search-box {
        background: rgba(15,23,42,.35);
        border: 1px solid rgba(148,163,184,.25);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 18px;
    }
    .select2-container--default .select2-selection--single {
        min-height: 38px;
        padding: 4px 0;
    }
    .select2-container--default .select2-search--dropdown .select2-search__field {
        padding: 8px 10px;
    }
</style>

<div class="container mt-10">
    <div class="d-flex justify-content-between align-items-center flex-wrap mb-3">
        <h2 class="card-titles mb-2">Send Money (Add / Deduct Wallet)</h2>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item"><a href="{% url 'admin_dashboard' %}">Dashboard</a></li>
                <li class="breadcrumb-item active" aria-current="page">Send Money</li>
            </ol>
        </nav>
    </div>

    <div class="card-body">
        <form method="post" id="admin-wallet-form" autocomplete="off">
            {% csrf_token %}

            <div class="wallet-search-box">
                <div class="form-group mb-0">
                    <label for="retailer_id">Search &amp; select customer</label>
                    <select name="retailer_id" id="retailer_id" class="form-control" required>
                        <option value="">— Type name or email to search —</option>
                        {% for user in users %}
                        <option
                            value="{{ user.id }}"
                            data-search="{{ user.full_name|lower }} {{ user.email|lower }} {{ user.role }} {% if user.tenant %}{{ user.tenant.name|lower }}{% endif %}"
                            data-balance="{{ user.wallet.balance|default:0 }}"
                        >
                            {{ user.full_name }} — {{ user.email }} ({{ user.role }}){% if user.tenant %} · {{ user.tenant.name }}{% endif %} · ₹{{ user.wallet.balance|default:0 }}
                        </option>
                        {% empty %}
                        <option value="" disabled>No users found</option>
                        {% endfor %}
                    </select>
                    <small class="text-muted d-block mt-2" id="selected-balance">Search by name, email, role or WL tenant — then select the customer.</small>
                </div>
            </div>

            <div class="form-group">
                <label for="amount">Amount</label>
                <input type="number" step="0.01" min="0.01" name="amount" id="amount" class="form-control" placeholder="e.g. 500" required>
            </div>

            <div class="form-group">
                <label>Action</label><br>
                <label class="mr-3 mb-0">
                    <input type="radio" name="action" value="add" checked required> Add Balance
                </label>
                <label class="mb-0">
                    <input type="radio" name="action" value="deduct" required> Deduct Balance
                </label>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <input type="text" name="description" id="description" class="form-control" placeholder="Optional note">
            </div>

            <button type="submit" class="btn btn-primary" id="wallet-submit-btn">Submit</button>
            <a href="{% url 'view_transactions' %}" class="btn btn-secondary">View Transactions</a>
        </form>
    </div>
</div>

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0/dist/js/select2.min.js"></script>
<script>
(function () {
    var form = document.getElementById('admin-wallet-form');
    var select = document.getElementById('retailer_id');
    var balHint = document.getElementById('selected-balance');
    var btn = document.getElementById('wallet-submit-btn');
    if (!form || !select) return;

    function updateBalance() {
        var opt = select.options[select.selectedIndex];
        if (!opt || !opt.value) {
            balHint.textContent = 'Search by name, email, role or WL tenant — then select the customer.';
            return;
        }
        balHint.textContent = 'Current wallet balance: ₹' + (opt.getAttribute('data-balance') || '0');
    }

    if (window.jQuery && jQuery.fn.select2) {
        jQuery(select).select2({
            placeholder: 'Type name or email to search…',
            allowClear: true,
            width: '100%',
            matcher: function (params, data) {
                if (jQuery.trim(params.term) === '') {
                    return data;
                }
                if (!data.element) {
                    return null;
                }
                var term = params.term.toLowerCase();
                var hay = (
                    (data.element.getAttribute('data-search') || '') + ' ' +
                    (data.text || '')
                ).toLowerCase();
                return hay.indexOf(term) !== -1 ? data : null;
            }
        }).on('change', updateBalance);
    } else {
        select.addEventListener('change', updateBalance);
    }

    updateBalance();

    form.addEventListener('submit', function (e) {
        if (!select.value) {
            e.preventDefault();
            alert('Please select a customer first.');
            if (window.jQuery && jQuery.fn.select2) {
                jQuery(select).select2('open');
            } else {
                select.focus();
            }
            return;
        }
        btn.disabled = true;
        btn.textContent = 'Processing…';
    });
})();
</script>
{% endblock %}
