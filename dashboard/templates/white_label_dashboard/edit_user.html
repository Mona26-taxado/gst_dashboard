{% extends 'white_label_dashboard/base.html' %}
{% block page_heading %}Edit User{% endblock %}
{% block content %}
<div class="wl-card" style="max-width:640px;">
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div style="color:#fca5a5;">{{ field.errors }}</div>{% endif %}
        </div>
        {% endfor %}
        <div class="form-group">
            <label>Referred by</label>
            <select name="referred_by" class="form-control">
                {% for p in parents %}
                <option value="{{ p.id }}" {% if gsk.referred_by_id == p.id %}selected{% endif %}>{{ p.full_name }} ({{ p.role }})</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn">Save</button>
        <a href="{% url 'white_label_view_users' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
